name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src/ scripts/ tests/

      - name: Black check
        run: uv run black --check src/ scripts/ tests/

      - name: Isort check
        run: uv run isort --check-only src/ scripts/ tests/

      - name: Run tests
        run: uv run pytest
